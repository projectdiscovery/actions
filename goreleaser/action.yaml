name: 'GoReleaser'
description: 'Run GoReleaser'

inputs:
  release:
    description: 'Run a full release instead of a snapshot binary build'
    required: false
    default: 'false'
  workdir:
    description: 'Working directory'
    required: false
    default: '.'
  args:
    description: 'Run with arguments'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - if: inputs.release == 'true'
      uses: projectdiscovery/actions/free-disk-space@v1
      with:
        llvm: 'false'
        php: 'false'
        mongodb: 'false'
        mysql: 'false'
        misc-packages: 'false'
        docker-images: 'false'
        tools-cache: 'false'
    - if: inputs.release == 'true' && runner.os == 'Linux'
      uses: docker/setup-qemu-action@v4
    - if: inputs.release == 'true' && runner.os == 'Linux'
      uses: docker/setup-buildx-action@v4
    - uses: goreleaser/goreleaser-action@v7
      with:
        version: 'latest'
        args: >-
          ${{ inputs.release == 'true' && 'release --skip=validate' || 'build --snapshot' }}
          --clean
          ${{ inputs.args }}
        workdir: '${{ inputs.workdir }}'
